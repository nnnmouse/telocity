repos:
  - repo: local
    hooks:
      - id: ripgrep-secrets
        name: Scan for API keys (OpenAI, Anthropic, DeepSeek, OpenRouter)
        entry: |
          bash -c '
            PATTERNS="sk-(proj|svcacct|admin)-[A-Za-z0-9_-]{40,}|sk-[A-Za-z0-9_-]{40,}|sk-ant-(api03|oat01)-[A-Za-z0-9_-]{40,}|sk-or-v1-[A-Za-z0-9]{48,}|sk-[A-Za-z0-9]{32,}"
            STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM)
            if [ -z "$STAGED_FILES" ]; then
              exit 0
            fi
            FOUND=""
            for FILE in $STAGED_FILES; do
              if rg -l --no-ignore --hidden "$PATTERNS" "$FILE" 2>/dev/null | grep -q .; then
                FOUND="$FOUND $FILE"
              fi
            done
            if [ -n "$FOUND" ]; then
              echo "Secrets detected in staged files:"
              echo "$FOUND"
              false
            fi
          '
        language: system
        stages: [pre-commit]
        pass_filenames: false
        verbose: true
